# ============================================================
# client-admin — Internal nginx (no external port exposure)
# Serves the admin SPA build artifacts only.
# All API proxying and static assets are handled by the gateway.
# ============================================================

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all /ocsc-circular/admin/* routes resolve to index.html
    location /ocsc-circular/admin/ {
        root   /usr/share/nginx/html;
        try_files $uri $uri/ /ocsc-circular/admin/index.html;
    }

    # Also handle /ocsc-circular/admin (without trailing slash)
    location = /ocsc-circular/admin {
        return 301 /ocsc-circular/admin/;
    }

    # Serve fonts at absolute path (CSS @font-face uses url("/fonts/..."))
    location /fonts/ {
        alias /usr/share/nginx/html/fonts/;
        access_log off;
        expires 30d;
    }

    # Health check endpoint for container orchestration
    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
