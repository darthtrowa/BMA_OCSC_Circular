server {
    listen 80;
    server_name localhost;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /uploads/ {
        alias /uploads/;
        add_header X-Content-Type-Options nosniff;
        expires 30d;
    }

    location /image/ {
        alias /image/;
        access_log off;
        expires 30d;
    }

    location /fonts/ {
        alias /fonts/;
        access_log off;
        expires 30d;
    }

    # Proxy API requests to the server container
    location /api {
        proxy_pass http://server:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # WARNING: Nginx routing conflict. Ensure Express admin API routes are namespaced under /api/admin to avoid being intercepted by this React /admin route.
    location /admin {
        # This handles /admin/auth/login etc if they are API calls
        # but if they are frontend routes, try_files above will handle them
        # if they start with /admin/ and are NOT in the static files.
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
