services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile.windows
    env_file:
      - path: .env
        required: false
      - path: .env.docker
        required: false
    volumes:
      - ./uploads:C:\uploads
      - ./image:C:\image
      - ./fonts:C:\fonts
    restart: unless-stopped

  client-public:
    build:
      context: ./client-public
      dockerfile: Dockerfile.windows
    depends_on:
      - server
    restart: unless-stopped

  client-admin:
    build:
      context: ./client-admin
      dockerfile: Dockerfile.windows
    depends_on:
      - server
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile.windows
    ports:
      - "8080:80"
    depends_on:
      - client-public
      - client-admin
      - server
    volumes:
      - ./uploads:C:\uploads:ro
      - ./image:C:\image:ro
      - ./fonts:C:\fonts:ro
    restart: unless-stopped
