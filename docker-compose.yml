services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: "${DB_PASSWORD?Error: DB_PASSWORD missing}"
      POSTGRES_DB: ${DB_NAME:-circular_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    depends_on:
      - db
    volumes:
      - ./uploads:/uploads
      - ./image:/image
      - ./fonts:/fonts
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server
    volumes:
      - ./uploads:/uploads
      - ./image:/image
      - ./fonts:/fonts
    restart: unless-stopped

volumes:
  pgdata:


