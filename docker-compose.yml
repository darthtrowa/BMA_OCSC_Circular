services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1956wine
      POSTGRES_DB: circular_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://admin:1956wine@db:5432/circular_db
      - DB_HOST=db
      - DB_USER=admin
      - DB_PASSWORD=1956wine
      - DB_NAME=circular_db
      - DB_PORT=5432
      - NODE_ENV=production
    depends_on:
      - db

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:

