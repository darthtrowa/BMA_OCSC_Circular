services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: "${DB_PASSWORD?Error: DB_PASSWORD missing}"
      POSTGRES_DB: ${DB_NAME:-circular_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    # STAB-13: Database health check
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/uploads
      - ./image:/image
      - ./fonts:/fonts
    restart: unless-stopped
    # STAB-13: Server health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Public Frontend ─────────────────────────────────────────
  # Serves the citizen-facing circular lookup UI.
  # Internal only — accessed via the gateway reverse proxy.
  client-public:
    build:
      context: ./client-public
      dockerfile: Dockerfile
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # ── Admin Frontend ──────────────────────────────────────────
  # Serves the admin dashboard (login, workflow, master data).
  # Internal only — accessed via the gateway reverse proxy.
  client-admin:
    build:
      context: ./client-admin
      dockerfile: Dockerfile
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  # ── Gateway Reverse Proxy ───────────────────────────────────
  # Single entry point on port 80. Routes traffic to the
  # appropriate frontend container and proxies API to server.
  gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    depends_on:
      - client-public
      - client-admin
      - server
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads:/uploads:ro
      - ./image:/image:ro
      - ./fonts:/fonts:ro
    restart: unless-stopped

volumes:
  pgdata:
