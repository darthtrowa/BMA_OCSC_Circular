# ============================================================
# Gateway Reverse Proxy — Routes to split frontend containers
# ============================================================
#
# Traffic flow:
#   Port 80 → gateway nginx
#     /ocsc-circular/admin/*  → client-admin container (port 80)
#     /ocsc-circular/api/*    → server container (port 3000)
#     /ocsc-circular/*        → client-public container (port 80)
#     /uploads, /image   → local volumes (static files)
# ============================================================

upstream public_frontend {
    server client-public:80;
}

upstream admin_frontend {
    server client-admin:80;
}

upstream api_backend {
    server server:3000;
}

server {
    listen 80;
    server_name localhost;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # BP-01: Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── API Proxy ─────────────────────────────────────────────
    # Must come before frontend location blocks to ensure
    # /ocsc-circular/api/* is never intercepted by the SPA fallback.
    location /ocsc-circular/api/ {
        proxy_pass http://api_backend/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Static Assets (shared volumes) ────────────────────────
    # BP-02: Restrict uploads to PDF content type only
    location /ocsc-circular/uploads/ {
        alias /uploads/;
        add_header X-Content-Type-Options nosniff;
        add_header Content-Disposition "inline";
        types { application/pdf pdf; }
        default_type application/pdf;
        expires 30d;
    }

    location /ocsc-circular/image/ {
        alias /image/;
        access_log off;
        expires 30d;
    }

    location /ocsc-circular/fonts/ {
        alias /fonts/;
        access_log off;
        expires 30d;
    }

    # ── Admin Frontend ────────────────────────────────────────
    # Routes /ocsc-circular/admin/* to the client-admin container.
    # Must come BEFORE the public /ocsc-circular/ block (longest prefix match).
    location /ocsc-circular/admin/ {
        proxy_pass http://admin_frontend/ocsc-circular/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Public Frontend ───────────────────────────────────────
    # Routes /ocsc-circular/* to the client-public container.
    # Catches all non-admin, non-API, non-static /ocsc-circular paths.
    location /ocsc-circular/ {
        proxy_pass http://public_frontend/ocsc-circular/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Root redirect ─────────────────────────────────────────
    location = / {
        return 301 /ocsc-circular/;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
